omint:
  name: Omint Assistance
  slug: omint
  status: active
  # JSON columns must be written as JSON strings, not YAML hashes: MariaDB
  # exposes them as longtext, so Rails' fixture loader falls back to to_yaml
  # and the resulting value fails the column's json_valid CHECK.
  config: |
    {
      "base_url": "https://oaapp.test.example.com",
      "token_endpoint": "https://core.omintassistance.com.ar/connect/token",
      "client_id": "test-client-id",
      "client_secret": "test-client-secret",
      "scope": "OACoreApi IntegrationWebApi",
      "agreement_number": 3329,
      "timeout": 30
    }
