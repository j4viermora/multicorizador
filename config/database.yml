default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate

test:
  <<: *default
  database: storage/test.sqlite3

production:
  primary: &production_mysql
    <%
      # Deliberately NOT named DATABASE_URL: Rails auto-merges any env var called
      # DATABASE_URL (or PRIMARY_DATABASE_URL) into the primary config and lets
      # the URL's scheme override `adapter:` above — which breaks when the URL
      # uses a "mariadb://" scheme instead of "mysql2://". Parsing it ourselves
      # under a different env var name sidesteps that entirely.
      # Falls back to a placeholder at asset-precompile time (Docker build),
      # when the real URL isn't available yet and no DB connection is needed.
      db_url = URI.parse(ENV.fetch("APP_DATABASE_URL", "mysql2://placeholder/placeholder"))
    %>
    adapter: mysql2
    host: <%= db_url.host %>
    port: <%= db_url.port || 3306 %>
    database: <%= db_url.path.delete_prefix("/") %>
    username: <%= URI.decode_www_form_component(db_url.user.to_s) %>
    password: <%= URI.decode_www_form_component(db_url.password.to_s) %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  cache:
    <<: *production_mysql
    migrations_paths: db/cache_migrate
  queue:
    <<: *production_mysql
    migrations_paths: db/queue_migrate
  cable:
    <<: *production_mysql
    migrations_paths: db/cable_migrate
