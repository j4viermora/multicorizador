# El adapter `async` solo entrega mensajes dentro del mismo proceso, y en
# desarrollo Solid Queue corre como proceso separado (ver Procfile.dev). Con
# `async`, un broadcast emitido desde un job se queda en el proceso worker y
# nunca llega al WebSocket que atiende Puma: la pantalla de cotización se queda
# "consultando proveedores" para siempre y los resultados recién aparecen al
# recargar. Solid Cable pasa los mensajes por la base, así que cruza procesos.
development:
  adapter: solid_cable
  # No `connects_to` — la tabla vive en la base principal.
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  # No `connects_to` — the messages table lives in the primary database.
  polling_interval: 0.1.seconds
  message_retention: 1.day
