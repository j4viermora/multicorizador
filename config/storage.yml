test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# S3-compatible object storage. Currently Cloudflare R2, hence the AWS_* names:
# they are the SDK's own convention and work for any S3-compatible provider.
#
# Three settings are what make R2 (rather than real AWS) work:
#
#   * `AWS_ENDPOINT` must point at the R2 account — without it the SDK talks to
#     AWS itself. It is the account URL, with no bucket appended.
#   * `AWS_REGION` must be "auto"; R2 has no regions.
#   * aws-sdk-s3 >= 1.178 sends CRC32 integrity checksums by default, which R2
#     rejects. `request_checksum_calculation: when_required` restores the old
#     behaviour. Removing it breaks every upload with a 501/400 from R2.
#
# Pointing at real AWS S3 later means dropping AWS_ENDPOINT and setting a real
# region; the checksum options are harmless there.
amazon:
  service: S3
  access_key_id: <%= ENV["AWS_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] %>
  endpoint: <%= ENV["AWS_ENDPOINT"] %>
  bucket: <%= ENV["AWS_BUCKET"] %>
  region: <%= ENV.fetch("AWS_REGION", "auto") %>
  request_checksum_calculation: when_required
  response_checksum_validation: when_supported

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

# Use bin/rails credentials:edit to set the Azure Storage secret (as azure_storage:storage_access_key)
# microsoft:
#   service: AzureStorage
#   storage_account_name: your_account_name
#   storage_access_key: <%= Rails.application.credentials.dig(:azure_storage, :storage_access_key) %>
#   container: your_container_name-<%= Rails.env %>

